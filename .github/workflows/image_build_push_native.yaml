name: Build Image and Push to Registries

on:
  workflow_call:
    inputs:
      DOCKERFILE_LOCATION:
        required: false
        type: string
        default: "./Dockerfile"
      AWS_REGION:
        required: false
        type: string
        default: "us-east-1"
      AWS_ECR_REGISTRY:
        required: false
        type: string
        default: "707767160287.dkr.ecr.us-east-1.amazonaws.com"
      DOCKERFILE_BUILD_CONTEXT:
        required: false
        type: string
        default: "."
      OVERRIDE_REPO_NAME:
        required: false
        type: string
        default: ""
      OVERRIDE_TAG_NAME:
        required: false
        type: string
        default: ""
      USE_QUAY_ONLY:
        required: false
        type: boolean
        default: false
      BUILD_PLATFORMS:
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
    secrets:
      ECR_AWS_ACCESS_KEY_ID:
        required: true
      ECR_AWS_SECRET_ACCESS_KEY:
        required: true
      QUAY_USERNAME:
        required: true
      QUAY_ROBOT_TOKEN:
        required: true

jobs:
  build:
    name: Build Images
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-22.04
          - platform: linux/arm64
            runner: ubuntu-22.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Prepare platform variables
        shell: bash
        run: |
          set -euo pipefail

          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set image variables
        shell: bash
        run: |
          set -euo pipefail

          echo "OVERRIDE_REPO_NAME = ${{ inputs.OVERRIDE_REPO_NAME }}"
          echo "OVERRIDE_TAG_NAME = ${{ inputs.OVERRIDE_TAG_NAME }}"

          if [[ -z "${{ inputs.OVERRIDE_TAG_NAME }}" ]]; then
            image_tag="$(echo "${GITHUB_REF#refs/*/}" | tr / _)"
            echo "No OVERRIDE_TAG_NAME input provided, defaulting to current branch/tag name: ${image_tag}"
          else
            image_tag="${{ inputs.OVERRIDE_TAG_NAME }}"
            echo "OVERRIDE_TAG_NAME provided, using IMAGE_TAG: ${image_tag}"
          fi

          if [[ -z "${{ inputs.OVERRIDE_REPO_NAME }}" ]]; then
            repo_name="$(echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}')"
            echo "No OVERRIDE_REPO_NAME input provided, defaulting to repo name: ${repo_name}"
          else
            repo_name="${{ inputs.OVERRIDE_REPO_NAME }}"
            echo "OVERRIDE_REPO_NAME provided, using REPO_NAME: ${repo_name}"
          fi

          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${repo_name}" >> "$GITHUB_ENV"

          if [[ "${{ inputs.USE_QUAY_ONLY }}" == "true" ]]; then
            echo "IMAGE_REPOS=quay.io/cdis/${repo_name}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_REPOS=quay.io/cdis/${repo_name},${{ inputs.AWS_ECR_REGISTRY }}/gen3/${repo_name}" >> "$GITHUB_ENV"
          fi

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Login to ECR
        if: ${{ !inputs.USE_QUAY_ONLY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.AWS_ECR_REGISTRY }}
          username: ${{ secrets.ECR_AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}
        env:
          AWS_REGION: ${{ inputs.AWS_REGION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            quay.io/cdis/${{ env.REPO_NAME }}
            ${{ !inputs.USE_QUAY_ONLY && format('{0}/gen3/{1}', inputs.AWS_ECR_REGISTRY, env.REPO_NAME) || '' }}

      - name: Build and push platform image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.DOCKERFILE_BUILD_CONTEXT }}
          file: ${{ inputs.DOCKERFILE_LOCATION }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ env.IMAGE_REPOS }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${{ runner.temp }}/digests"

          digest="${{ steps.build.outputs.digest }}"
          digest="${digest#sha256:}"

          if [[ -z "${digest}" ]]; then
            echo "ERROR: build-push-action did not return a digest"
            exit 1
          fi

          echo "Exporting digest: sha256:${digest}"
          touch "${{ runner.temp }}/digests/${digest}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          overwrite: true
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set image variables
        shell: bash
        run: |
          set -euo pipefail

          echo "OVERRIDE_REPO_NAME = ${{ inputs.OVERRIDE_REPO_NAME }}"
          echo "OVERRIDE_TAG_NAME = ${{ inputs.OVERRIDE_TAG_NAME }}"

          if [[ -z "${{ inputs.OVERRIDE_TAG_NAME }}" ]]; then
            image_tag="$(echo "${GITHUB_REF#refs/*/}" | tr / _)"
            echo "No OVERRIDE_TAG_NAME input provided, defaulting to current branch/tag name: ${image_tag}"
          else
            image_tag="${{ inputs.OVERRIDE_TAG_NAME }}"
            echo "OVERRIDE_TAG_NAME provided, using IMAGE_TAG: ${image_tag}"
          fi

          if [[ -z "${{ inputs.OVERRIDE_REPO_NAME }}" ]]; then
            repo_name="$(echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}')"
            echo "No OVERRIDE_REPO_NAME input provided, defaulting to repo name: ${repo_name}"
          else
            repo_name="${{ inputs.OVERRIDE_REPO_NAME }}"
            echo "OVERRIDE_REPO_NAME provided, using REPO_NAME: ${repo_name}"
          fi

          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${repo_name}" >> "$GITHUB_ENV"

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Login to ECR
        if: ${{ !inputs.USE_QUAY_ONLY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.AWS_ECR_REGISTRY }}
          username: ${{ secrets.ECR_AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}
        env:
          AWS_REGION: ${{ inputs.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: List downloaded digests
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        run: |
          set -euo pipefail

          echo "Downloaded digest artifacts:"
          ls -la

          digest_count="$(find . -maxdepth 1 -type f | wc -l | tr -d ' ')"

          if [[ "${digest_count}" -eq 0 ]]; then
            echo "ERROR: no digest artifacts were downloaded"
            exit 1
          fi

          echo "Found ${digest_count} digest artifact(s)"

      - name: Wait for Quay digests to become available
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        run: |
          set -euo pipefail

          for digest_file in *; do
            digest="${digest_file#sha256:}"
            ref="quay.io/cdis/${{ env.REPO_NAME }}@sha256:${digest}"

            echo "Checking Quay digest: ${ref}"

            for attempt in {1..20}; do
              if docker buildx imagetools inspect "${ref}" >/dev/null 2>&1; then
                echo "Digest is available in Quay: ${ref}"
                break
              fi

              if [[ "${attempt}" -eq 20 ]]; then
                echo "ERROR: digest was not available in Quay after retries: ${ref}"
                exit 1
              fi

              echo "Digest not available yet in Quay. Attempt ${attempt}/20. Retrying..."
              sleep 6
            done
          done

      - name: Wait for ECR digests to become available
        if: ${{ !inputs.USE_QUAY_ONLY }}
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        run: |
          set -euo pipefail

          for digest_file in *; do
            digest="${digest_file#sha256:}"
            ref="${{ inputs.AWS_ECR_REGISTRY }}/gen3/${{ env.REPO_NAME }}@sha256:${digest}"

            echo "Checking ECR digest: ${ref}"

            for attempt in {1..20}; do
              if docker buildx imagetools inspect "${ref}" >/dev/null 2>&1; then
                echo "Digest is available in ECR: ${ref}"
                break
              fi

              if [[ "${attempt}" -eq 20 ]]; then
                echo "ERROR: digest was not available in ECR after retries: ${ref}"
                exit 1
              fi

              echo "Digest not available yet in ECR. Attempt ${attempt}/20. Retrying..."
              sleep 6
            done
          done

      - name: Create manifest list and push to Quay
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        run: |
          set -euo pipefail

          quay_refs=()

          for digest_file in *; do
            digest="${digest_file#sha256:}"
            quay_refs+=("quay.io/cdis/${{ env.REPO_NAME }}@sha256:${digest}")
          done

          echo "Creating Quay manifest:"
          printf '  %s\n' "${quay_refs[@]}"

          docker buildx imagetools create \
            -t "quay.io/cdis/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}" \
            "${quay_refs[@]}"

      - name: Create manifest list and push to ECR
        if: ${{ !inputs.USE_QUAY_ONLY }}
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        run: |
          set -euo pipefail

          ecr_refs=()

          for digest_file in *; do
            digest="${digest_file#sha256:}"
            ecr_refs+=("${{ inputs.AWS_ECR_REGISTRY }}/gen3/${{ env.REPO_NAME }}@sha256:${digest}")
          done

          echo "Creating ECR manifest:"
          printf '  %s\n' "${ecr_refs[@]}"

          docker buildx imagetools create \
            -t "${{ inputs.AWS_ECR_REGISTRY }}/gen3/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}" \
            "${ecr_refs[@]}"

      - name: Inspect Quay image
        shell: bash
        run: |
          set -euo pipefail

          docker buildx imagetools inspect \
            "quay.io/cdis/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Inspect ECR image
        if: ${{ !inputs.USE_QUAY_ONLY }}
        shell: bash
        run: |
          set -euo pipefail

          docker buildx imagetools inspect \
            "${{ inputs.AWS_ECR_REGISTRY }}/gen3/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}"
